<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="사자성어 300개를 한자 빈칸과 뜻풀이 문제로 익히는 60초 한자 퀴즈 게임"
    />
    <title>사자성어 퀴즈</title>
  </head>
  <body>
    <div id="root">
      <main>
        <h1>사자성어 퀴즈</h1>
        <p>
          사자성어 퀴즈는 한자 네 글자로 이루어진 성어를 빈칸 한자와 뜻풀이 문제로
          익히는 학습형 퀴즈입니다. 일석이조, 칠전팔기, 동상이몽처럼 자주 쓰이는
          성어의 한자, 독음, 의미를 함께 확인하며 60초 동안 빠르게 복습할 수 있습니다.
        </p>
        <section aria-label="사자성어 예시">
          <h2>예시 성어</h2>
          <ul>
            <li><strong>一石二鳥</strong> 일석이조: 한 가지 행동으로 두 가지 이득을 얻는다는 뜻.</li>
            <li><strong>七轉八起</strong> 칠전팔기: 여러 번 실패해도 굴하지 않고 다시 일어남.</li>
            <li><strong>同床異夢</strong> 동상이몽: 겉으로는 함께하지만 속으로는 서로 다른 생각을 함.</li>
          </ul>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
